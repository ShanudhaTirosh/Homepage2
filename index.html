<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaDash — Your Universe, Your Dashboard</title>
  <meta name="description" content="The next-generation personal browser start page. Cloud-synced, AI-powered, and infinitely customizable." />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#7c6ef7" />

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── Sign-in page specifics ── */
    body.signin-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: var(--bg-primary);
    }

    /* Particle Canvas */
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Orb decorations */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--accent-primary), transparent 70%);
      top: -200px; left: -200px;
      animation: orbFloat1 18s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent-secondary), transparent 70%);
      bottom: -150px; right: -150px;
      animation: orbFloat2 22s ease-in-out infinite;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #ff6b9d, transparent 70%);
      top: 40%; left: 60%;
      animation: orbFloat1 14s ease-in-out infinite reverse;
    }

    /* Sign-in card */
    .signin-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      animation: fadeInScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .signin-card .card-inner {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .brand-logo .logo-mark {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 8px 20px rgba(124,110,247,0.4);
      animation: logoGlow 3s ease-in-out infinite;
    }

    .brand-logo .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--text-primary);
      letter-spacing: -0.03em;
    }

    .brand-logo .logo-text span {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .signin-headline {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .signin-subline {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* Google Sign-In Button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 0.875rem 1.5rem;
      background: white;
      color: #1f1f1f;
      border: none;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .btn-google:active { transform: translateY(0); }

    .btn-google .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(0,0,0,0.1);
      animation: rippleEffect 0.6s ease-out;
      pointer-events: none;
    }

    .google-icon {
      width: 20px; height: 20px;
      flex-shrink: 0;
    }

    .divider-text {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 1.25rem 0;
      position: relative;
    }

    .divider-text::before, .divider-text::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--glass-border);
    }

    .divider-text::before { left: 0; }
    .divider-text::after  { right: 0; }

    .btn-guest {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem;
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      border-radius: 14px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-guest:hover {
      background: var(--glass-bg);
      color: var(--text-primary);
      border-color: var(--accent-primary);
    }

    /* Feature pills */
    .feature-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 2rem;
    }

    .feature-pill {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 100px;
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .feature-pill i { color: var(--accent-primary); font-size: 0.7rem; }

    /* Stats footer */
    .signin-stats {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.78rem;
    }

    .signin-stats strong { color: var(--text-secondary); }

    /* Loading skeleton */
    .auth-loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .auth-loading.visible { display: flex; }

    .spinner-ring {
      width: 48px; height: 48px;
      border: 3px solid var(--glass-border);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes logoGlow {
      0%, 100% { box-shadow: 0 8px 20px rgba(124,110,247,0.4); }
      50% { box-shadow: 0 8px 30px rgba(124,110,247,0.7); }
    }
    @keyframes rippleEffect {
      from { transform: scale(0); opacity: 1; }
      to { transform: scale(4); opacity: 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="signin-page">

  <!-- Background elements -->
  <canvas id="particle-canvas"></canvas>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <!-- Main Sign-in Card -->
  <div class="signin-card px-3">
    <div class="card-inner">

      <!-- Auth Loading State -->
      <div class="auth-loading" id="authLoading">
        <div class="spinner-ring"></div>
        <p style="color: var(--text-muted); font-size: 0.9rem;">Signing you in…</p>
      </div>

      <!-- Sign-in Content -->
      <div id="signinContent">
        <div class="brand-logo">
          <div class="logo-mark">🌌</div>
          <div class="logo-text">Nova<span>Dash</span></div>
        </div>

        <h1 class="signin-headline">Welcome back, explorer.</h1>
        <p class="signin-subline">Sign in to access your personal universe dashboard.</p>

        <button class="btn-google" id="btnGoogle" onclick="handleGoogleSignIn(event)">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider-text">or</div>

        <button class="btn-guest" id="btnGuest" onclick="handleGuestSignIn()">
          <i class="bi bi-person-dash"></i>
          Continue as Guest <span style="opacity:0.6;margin-left:4px;">(local only, no sync)</span>
        </button>

        <div class="feature-pills">
          <div class="feature-pill"><i class="bi bi-cloud-fill"></i> Cloud Sync</div>
          <div class="feature-pill"><i class="bi bi-robot"></i> AI Assistant</div>
          <div class="feature-pill"><i class="bi bi-layers-fill"></i> Workspaces</div>
          <div class="feature-pill"><i class="bi bi-wifi-off"></i> Offline Mode</div>
          <div class="feature-pill"><i class="bi bi-phone"></i> PWA Ready</div>
        </div>
      </div>

      <div class="signin-stats" id="signinStats">
        Trusted by <strong>thousands</strong> of productivity enthusiasts worldwide.
      </div>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Firebase SDK v10 (ESM) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, onAuthStateChanged, browserLocalPersistence, setPersistence } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // ── Firebase Config ── (Replace with your own)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Set persistence
    setPersistence(auth, browserLocalPersistence);

    // Auth state check - redirect if already signed in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        showLoading();
        window.location.href = 'dashboard.html';
      }
    });

    // Expose to window for button handlers
    window._auth = auth;
    window._provider = provider;
    window._signInWithPopup = signInWithPopup;
    window._signInAnonymously = signInAnonymously;
  </script>

  <script>
    // ── Particle Mesh Canvas ──
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const PARTICLE_COUNT = 80;
      const MAX_DISTANCE = 140;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createParticles() {
        particles = [];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            r: Math.random() * 2.5 + 0.5,
            opacity: Math.random() * 0.5 + 0.2
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw connections
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < MAX_DISTANCE) {
              const alpha = (1 - dist / MAX_DISTANCE) * 0.15;
              ctx.strokeStyle = `rgba(124, 110, 247, ${alpha})`;
              ctx.lineWidth = 1;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        // Draw particles
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(124, 110, 247, ${p.opacity})`;
          ctx.fill();

          // Move
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        });

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); createParticles(); });
      resize();
      createParticles();
      draw();
    })();

    // ── Button Handlers ──
    function showLoading() {
      document.getElementById('authLoading').classList.add('visible');
      document.getElementById('signinContent').style.display = 'none';
    }

    function hideLoading() {
      document.getElementById('authLoading').classList.remove('visible');
      document.getElementById('signinContent').style.display = 'block';
    }

    async function handleGoogleSignIn(e) {
      // Ripple effect
      const btn = e.currentTarget;
      const ripple = document.createElement('span');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.className = 'ripple';
      ripple.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px;`;
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 700);

      try {
        showLoading();
        await window._signInWithPopup(window._auth, window._provider);
        // onAuthStateChanged will handle redirect
      } catch (err) {
        console.error('Sign-in error:', err);
        hideLoading();
        const errMsg = err.code === 'auth/popup-closed-by-user'
          ? 'Sign-in cancelled.'
          : 'Sign-in failed. Please try again.';
        showSignInError(errMsg);
      }
    }

    async function handleGuestSignIn() {
      try {
        showLoading();
        localStorage.setItem('novadash_guest', 'true');
        await window._signInAnonymously(window._auth);
      } catch (err) {
        console.error('Guest sign-in error:', err);
        hideLoading();
        showSignInError('Guest sign-in failed. Please try again.');
      }
    }

    function showSignInError(msg) {
      let el = document.getElementById('signinError');
      if (!el) {
        el = document.createElement('div');
        el.id = 'signinError';
        el.style.cssText = 'color:#ff6b6b;font-size:0.85rem;text-align:center;margin-top:1rem;padding:0.75rem;background:rgba(255,107,107,0.1);border-radius:8px;border:1px solid rgba(255,107,107,0.2);';
        document.getElementById('signinContent').appendChild(el);
      }
      el.textContent = msg;
      setTimeout(() => el.remove(), 4000);
    }
  </script>
</body>
</html>
