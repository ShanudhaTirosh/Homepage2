<!DOCTYPE html>
<html lang="en" data-theme="midnight">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaDash — Offline</title>
  <link rel="stylesheet" href="css/themes.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .offline-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      max-width: 440px;
      animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1.25rem;
      animation: pulse 2s ease-in-out infinite;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }
    p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: var(--text-on-accent);
      border: none;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }
    .btn-retry:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }
    .cached-note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      NovaDash can't reach the internet right now.<br>
      Don't worry — your locally cached links are still accessible.
    </p>

    <a href="dashboard.html" class="btn-retry">
      ↻ Try Again
    </a>

    <p class="cached-note">
      Any changes you make while offline will automatically sync when you reconnect.
    </p>
  </div>

  <script>
    // Auto-redirect when connection restored
    window.addEventListener('online', () => {
      window.location.href = 'dashboard.html';
    });

    // Show cached state if already loaded the app before
    if ('serviceWorker' in navigator) {
      const msg = document.createElement('p');
      msg.style.cssText = 'font-size:0.78rem;color:var(--text-muted);margin-top:1rem';
      msg.textContent = '✓ Cached version available from service worker';
      document.querySelector('.offline-card').appendChild(msg);
    }
  </script>
</body>
</html>
